name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'backend/**'
      - 'frontend/**'

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false  # Never cancel in-progress deployments

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/shanaysoni/blockscope/backend
  FRONTEND_IMAGE: ghcr.io/shanaysoni/blockscope/frontend

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=staging,enable=true

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:staging
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.environment || 'staging' }}"
          echo "   Backend:  ${{ env.BACKEND_IMAGE }}:staging"
          echo "   Frontend: ${{ env.FRONTEND_IMAGE }}:staging"
          echo "   Commit:   ${{ github.sha }}"
          echo ""
          echo "📋 To deploy manually, run:"
          echo "   docker pull ${{ env.BACKEND_IMAGE }}:staging"
          echo "   docker pull ${{ env.FRONTEND_IMAGE }}:staging"
          echo "   docker compose -f docker/docker-compose.prod.yml up -d"

      # ─── Uncomment below when you have a staging server ───
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.STAGING_HOST }}
      #     username: ${{ secrets.STAGING_USER }}
      #     key: ${{ secrets.STAGING_SSH_KEY }}
      #     script: |
      #       cd /opt/blockscope
      #       docker compose -f docker/docker-compose.prod.yml pull
      #       docker compose -f docker/docker-compose.prod.yml up -d
      #       sleep 10
      #       curl -f http://localhost:8000/health || exit 1

  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify deployment
        run: |
          echo "✅ Deployment completed successfully"
          echo "   Environment: ${{ github.event.inputs.environment || 'staging' }}"
          echo "   Commit: ${{ github.sha }}"
          echo ""
          echo "🔍 Health check: Connect your staging URL here"
          # Uncomment when staging URL is available:
          # curl -f https://staging.blockscope.io/health || exit 1
