# ─── PRODUCTION docker-compose ───
# ⚠️  DO NOT use default credentials. Set all env vars in .env or a secrets manager.
# See DEPLOYMENT.md for production setup instructions.
#
# Usage:
#   cp .env.example .env          # then fill in real values
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ─── Database ───
  db:
    image: postgres:15-alpine
    container_name: blockscope_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port exposure — backend accesses via internal network
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes Compose interpolation so the container's own env-var is used
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: blockscope_redis
    restart: always
    # No host port exposure — backend accesses via internal network
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ─── Backend ───
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.dev
    container_name: blockscope_backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RATE_LIMIT_ENABLED: "True"
      ENVIRONMENT: production
      DEBUG: "False"
      ENABLE_API_DOCS: "False"
      LOG_JSON_FORMAT: "True"
      LOG_REQUEST_BODY: "False"
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 4
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ─── Frontend ───
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    container_name: blockscope_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:5173"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: blockscope_network
