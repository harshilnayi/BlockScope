# =============================================================================
# BlockScope — Production Docker Compose
# =============================================================================
# Usage:
#   cp backend/.env.example backend/.env   # Edit with production values
#   docker compose -f docker/docker-compose.prod.yml up -d --build
# =============================================================================

services:
  # ── Backend API ──
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend.prod
    container_name: blockscope-backend
    restart: always
    env_file:
      - ../backend/.env
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blockscope-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Frontend ──
  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend.prod
    container_name: blockscope-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - blockscope-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── PostgreSQL ──
  postgres:
    image: postgres:15-alpine
    container_name: blockscope-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blockscope}
      POSTGRES_USER: ${POSTGRES_USER:-blockscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blockscope-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blockscope}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: blockscope-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - blockscope-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:stable-alpine
    container_name: blockscope-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - blockscope-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Certbot (SSL certificates) ──
  certbot:
    image: certbot/certbot
    container_name: blockscope-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:

networks:
  blockscope-network:
    driver: bridge
