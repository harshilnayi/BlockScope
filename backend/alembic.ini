# BlockScope Alembic Configuration
# Database URL is loaded from the DATABASE_URL environment variable at runtime.
# See alembic/env.py for details.

[alembic]
# Path to migration scripts — relative to this file's directory.
script_location = alembic

# Template for migration file names.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# Version path separator (os.pathsep).
version_path_separator = os

# Placeholder — overridden at runtime by env.py using DATABASE_URL env var.
# DO NOT put real credentials here.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Format new migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
