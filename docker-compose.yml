
# ─── DEVELOPMENT docker-compose ───
# For production, use docker-compose.prod.yml with proper secrets management.
services:
  # ─── Database ───
  db:
    image: postgres:15-alpine
    container_name: blockscope_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blockscope_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-blockscope_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes Compose interpolation so the container's own env-var is used
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: blockscope_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (dev with hot-reload) ───
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.dev
    container_name: blockscope_backend
    restart: unless-stopped
    env_file:
      - backend/.env.development
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blockscope_dev}:${POSTGRES_PASSWORD:-dev_password_change_me}@db:5432/${POSTGRES_DB:-blockscope_dev}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_ENABLED: "True"
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Frontend (dev with HMR) ───
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    container_name: blockscope_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: blockscope_network
